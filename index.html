<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Games</title>
    <link rel="stylesheet" href="css/common.css">
</head>
    <body>
        <div id="launcher">
            <h1>Сборник игр</h1>
            <div id="games-grid">
                <div class="game-card" data-game="CosmoShuter">
                    <img src="images/thumbnails/cosmo.png" alt="Cosmo Shuter">
                    <h3>Космический шутер</h3>
                    <p>Уничтожай врагов и собирай бонусы</p>
                </div>
                <div class="game-card" data-game="Arcanoid">
                    <img src="images/thumbnails/arcanoid.png" alt="Arcanoid">
                    <h3>Арканоид</h3>
                    <p>Разбивай блоки мячом</p>
                </div>
            </div>
        </div>

        <div id="game-container" class="hidden">
            <button id="back-btn">← Назад в меню</button>
            <iframe id="game-frame" src=""></iframe>
        </div>

        <script type="module" src="js/GameLauncher.js"></script>
    </body>
</html>
